#:schema file:///groups/cryoet/cryoet/data/scratch/src/schema/acquisition.schema.json
# acquisition.toml — researcher-authored per-acquisition metadata.
# One file per acquisition, placed at the root of each acquisition directory.
# The acquisition directory name IS the acquisition's identity — not repeated here.
#
# Likewise, every [raw_tomogram], [[post_processed_tomogram]] and [[annotation]] entry in this file implicitly
# belongs to the enclosing acquisition directory. No `acquisition_id` field is
# needed — the validator injects it from the path at load time.
#
# HOW TO USE THIS TEMPLATE
# ────────────────────────
# 1. Uncomment the [acquisition] section and replace every "<FILL IN>" placeholder.
# 2. Add a [[tilt_series]] block for each tilt series (raw and/or aligned).
# 3. Append a [raw_tomogram] / [[post_processed_tomogram]] block for each
#    tomogram processing pipeline output. Point each one's `tilt_series_id` at
#    the [[tilt_series]] it was reconstructed from.
# 4. Append an [[annotation]] block for each annotation.
# 5. Entries are immutable once added — reprocessing produces a NEW entry
#    with a new `id`. Never modify or delete existing entries.
#
# The portal reads pixel size, tilt angles, dose, date, voltage, camera,
# and energy filter slit width directly from MDOC files — omit those here.
#
# EXTRA FIELDS
# ────────────
# You may add any key-value pair that is not yet in schema.py. The
# validator reports it as a warning but the file still passes.
#
# VALIDATION
# ──────────
# Run from the sample root before committing:
#   pixi run validate {sample_dir}


# ════════════════════════════════════════════════════════════════
# Acquisition parameters
# Researcher-authored imaging parameters that are not in MDOC files.
# ════════════════════════════════════════════════════════════════

[acquisition]
# resolution    = "<FILL IN>"   # float, nominal resolution in Å, e.g. 3.5
# tilt_spacing  = "<FILL IN>"   # float, target tilt step in degrees, e.g. 3.0 (intent; actual angles come from the MDOC)
# defocus_range = "<FILL IN>"   # text, target defocus range in µm, e.g. "-1.5 to -3.0" (intent; per-image actuals come from the MDOC)
# energy_filter = "<FILL IN>"   # text, model name, e.g. "Selectris", "GIF Quantum", "none"
# phase_plate   = "<FILL IN>"   # boolean, true | false
# microscope    = "<FILL IN>"   # text, model name, e.g. "Titan Krios", "Glacios"
# facility      = "<FILL IN>"   # text, imaging facility, e.g. "Janelia"
# acquisition_quality = "<FILL IN>"        # integer 1-5, author's estimate of the acquisition quality (alignability + projection-image survival):
#                                          #   5 = Excellent, reconstructions could be publication-ready
#                                          #   4 = Good, useful for analysis (subtomogram averaging, segmentation)
#                                          #   3 = Medium, minor projection images discarded before reconstruction
#                                          #   2 = Marginal, major projection images discarded; usable only after heavy manual work
#                                          #   1 = Low, not alignable / not useful for analysis

# ── Tilt series (uncomment and fill in) ────────────────────────────────────────
# One acquisition can have MULTIPLE tilt series, both raw/unaligned and aligned — copy-paste this block to add as
# many [[tilt_series]] entries as needed. Each tomogram below references the tilt series it was reconstructed
# from via its `tilt_series_id`.

# [[tilt_series]]
# id                  = "<FILL IN>"   # text, tilt series id, MUST equal the tilt series' folder name under TiltSeries/
# derived_from        = "<FILL IN>"   # text, MUST equal either "Frames" or another tilt series' folder name under TiltSeries/
# is_aligned          = "<FILL IN>"   # boolean, true | false; indicates whether the tilt series is aligned
# alignment_software  = "<FILL IN>"   # text, e.g. "IMOD 4.12", "AreTomo3"
# alignment_method    = "<FILL IN>"   # text, e.g. fiducial | patch_tracking | feature_tracking

# ── MD source  (simulation data only) ────────────────────────────────────────
# Which MD run + frame this acquisition's synthetic data came from.

# [md_source]
# md_run_id = "<FILL IN>"   # text, MUST match a MdRuns/{id}/ folder name (the md_run.toml id)
# frame     = "<FILL IN>"   # integer, frame/snapshot index in the MD run

# ════════════════════════════════════════════════════════════════
# Processing log
# Append entries below as tomograms and annotations are produced.
# Copy-paste the [[post_processed_tomogram]] and [[annotation]] blocks so there is one for each produced
# These start empty — add them as processing happens.
# ════════════════════════════════════════════════════════════════

# [raw_tomogram]
# id             = "<FILL IN>"   # text, MUST equal the tomogram's folder name
# tilt_series_id = "<FILL IN>"   # text, id of the [[tilt_series]] above this reconstruction was built from. MUST equal a tilt_series id recorded above. Omit if not applicable.
# pipeline       = "<FILL IN>"   # text, e.g. "backprojection + 3D CTF correction"
# software       = "<FILL IN>"   # text, e.g. "IMOD 4.12 + novaCTF"
# derived_from   = "<FILL IN>"   # list[text], list of tomogram ids in this acquisition; empty for raw reconstructions

# [[post_processed_tomogram]]
# id                        = "<FILL IN>"   # text, MUST equal the tomogram's folder name
# tilt_series_id            = "<FILL IN>"   # text, id of the [[tilt_series]] above this reconstruction was built from. MUST equal a tilt_series id recorded above. Omit if not applicable.
# denoising_software        = "<FILL IN>"   # text
# ctf_software              = "<FILL IN>"   # text
# missing_wedge_software    = "<FILL IN>"   # text
# derived_from              = "<FILL IN>"   # list of tomogram ids in this acquisition; empty for raw reconstructions

# [[annotation]]
# id              = "<FILL IN>"   # text, MUST equal the annotation's folder name, e.g. "membrain_seg_v10"
# type            = "<FILL IN>"   # text, e.g. membrane_segmentation | nucleosome_placement | active_zone
# target_tomogram = "<FILL IN>"   # text, id of the tomogram in this acquisition that this was generated from
